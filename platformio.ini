; ESP32-S3 Smartwatch firmware
; Board: Hosyond ESP32-S3 2.8" 240x320 (ES3C28P/ES3N28P)
;
; Environments:
;   diag      -> lightweight silicon probe (run first, no display libs)
;   watch     -> full firmware, USB flash (hold BOOT+tap RST first)
;   watch-ota -> full firmware, WiFi OTA flash (watch must be on WiFi)

[platformio]
default_envs = watch

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600
; USB OTG / TinyUSB: composite CDC (Serial) + HID keyboard for USB ducky feature.
; ARDUINO_USB_MODE=0 switches from the hardware USB-Serial-JTAG controller to the
; USB OTG peripheral running TinyUSB.
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; NimBLE bonds: bump from the upstream default (3) so pairing a 2nd
    ; or 3rd host doesn't evict the first. CCCD count scales with bonds *
    ; characteristics that support notifications; bump it in lockstep so
    ; subscriptions survive too.
    -DCONFIG_BT_NIMBLE_MAX_BONDS=8
    -DCONFIG_BT_NIMBLE_MAX_CCCDS=24
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; Shared library list used by both watch envs (extends doesn't inherit lib_deps).
[watch_libs]
lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    lvgl/lvgl@^9.2.0
    h2zero/NimBLE-Arduino@^1.4.3
    bblanchon/ArduinoJson@^7.2.0
    esp32async/AsyncTCP@^3.4.10
    esp32async/ESPAsyncWebServer@^3.10.5
    ricmoo/QRCode@^0.0.1

; ---------------------------------------------------------------------------
[env:diag]
build_src_filter = -<*> +<diag.cpp>

; ---------------------------------------------------------------------------
[env:watch]
build_src_filter = +<*> -<diag.cpp>
build_flags =
    ${env.build_flags}
    -DLV_CONF_PATH='"${platformio.include_dir}/lv_conf.h"'
    -DLV_LVGL_H_INCLUDE_SIMPLE
lib_deps = ${watch_libs.lib_deps}
; TinyUSB CDC virtualizes DTR/RTS so esptool auto-reset doesn't work, and
; soft-triggered ROM download mode is unreliable on this build (TinyUSB
; leaves the USB peripheral in a state the ROM can't recover).
;
; Day-to-day: build, then install via MSC. On the watch open USB > SD CARD
; to expose the card to the host, copy firmware.bin to the root, eject,
; then open USB > INSTALL and tap INSTALL.
;   pio run -e watch
;   cp .pio/build/watch/firmware.bin /run/media/$USER/<sd>/firmware.bin && sync
;
; Recovery only (firmware bricked / unresponsive): pop the case, hold BOOT,
; tap RST, release BOOT, then:
;   pio run -e watch -t upload
upload_port = /dev/ttyACM0
upload_flags =
    --before
    no_reset

; ---------------------------------------------------------------------------
; OTA: flash over WiFi once ArduinoOTA is running on the watch.
;   pio run -e watch-ota -t upload
[env:watch-ota]
build_src_filter = +<*> -<diag.cpp>
build_flags =
    ${env.build_flags}
    -DLV_CONF_PATH='"${platformio.include_dir}/lv_conf.h"'
    -DLV_LVGL_H_INCLUDE_SIMPLE
lib_deps = ${watch_libs.lib_deps}
upload_protocol = espota
; mDNS hostname so this keeps working across DHCP lease changes. If your host
; can't resolve .local, fall back to the IP printed at boot on serial.
upload_port = smartwatch.local
